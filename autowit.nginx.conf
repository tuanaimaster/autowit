# ── HTTP redirect ─────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name autowit.me www.autowit.me;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ── HTTPS main ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name autowit.me www.autowit.me;

    ssl_certificate     /etc/letsencrypt/live/autowit.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autowit.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/autowit.access.log;
    error_log  /var/log/nginx/autowit.error.log warn;

    # ── NestJS API (/api/* and /webhook/*)  ───────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        # SSE support (AI chat streaming)
        proxy_buffering    off;
        proxy_cache        off;
    }

    location /webhook/ {
        proxy_pass         http://127.0.0.1:3001/webhook/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── n8n (/n8n/*) ──────────────────────────────────────────────────────
    location /n8n/ {
        rewrite            ^/n8n/(.*) /$1 break;
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    # ── Next.js frontend (everything else) ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    client_max_body_size 50M;
}
